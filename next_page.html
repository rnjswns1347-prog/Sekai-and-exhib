<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권준의 세계 - 메인 전시</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            height: 100vh;
            display: flex;
            box-sizing: border-box;
        }

        /* 왼쪽 영역: 이미지를 왼쪽 하단에 배치 */
        .left-section {
            flex: 1;
            display: flex;
            align-items: flex-end; /* 하단 정렬 */
            justify-content: flex-start; /* 좌측 정렬 */
            padding: 50px;
        }

        /* 임시 이미지 박스 (나중에 실제 img 태그로 교체 가능) */
        .image-placeholder {
            width: 350px;
            height: 450px;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-radius: 4px; /* 살짝 둥근 모서리 */
        }

        /* 오른쪽 영역: 텍스트 중앙 배치 */
        .right-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 10vw 50px 50px;
        }

        .intro-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555;
            font-weight: 400;
        }

        /* 밑줄 쳐진 링크 키워드 스타일 */
        .keyword-link {
            color: #111;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid #333; /* 밑줄 두께 및 색상 */
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        /* 키워드에 마우스를 올렸을 때의 변화 */
        .keyword-link:hover {
            color: #E1AD01; /* 머스타드 색으로 변경 */
            border-bottom-color: #E1AD01;
            background-color: rgba(225, 173, 1, 0.1); /* 배경에 살짝 형광펜 효과 */
        }
    </style>
</head>
<body>

    <div class="left-section">
        <div class="image-placeholder">Image Area</div>
    </div>

    <div class="right-section">
        <h1 class="intro-title">권준의 세계에<br>오신 것을 환영합니다.</h1>
        <p class="intro-text">
            이곳은 단어와 이미지 사이의 경계를 탐구하는 공간입니다.<br><br>
            우리가 무심코 지나친 <a href="theme1.html" class="keyword-link">기억</a>의 조각들, 
            비어있음으로 비로소 완성되는 <a href="theme2.html" class="keyword-link">공간</a>의 질감, 
            그리고 일정한 방향으로 흐르지 않는 <a href="theme3.html" class="keyword-link">시간</a>의 궤적들을 천천히 따라가며 관람해 주시기 바랍니다.
        </p>
    </div>

</body>
</html>
