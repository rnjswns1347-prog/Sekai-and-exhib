<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권준의 세계 - 메인 전시</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            height: 100vh;
            display: flex;
            box-sizing: border-box;
            overflow: hidden; /* 화면 넘어가는 것 방지 */
        }

        /* 왼쪽 영역: 이미지를 왼쪽 하단에 딱 붙게 배치 */
        .left-section {
            flex: 1.2; /* 가로 이미지 공간을 위해 비율을 조금 더 늘림 */
            display: flex;
            align-items: flex-end; /* 맨 아래로 정렬 */
            justify-content: flex-start; /* 맨 왼쪽으로 정렬 */
            padding: 0 0 50px 50px; /* 아래와 왼쪽에만 50px 여백을 주어 하단 밀착감 강조 */
        }

        /* 가로형 이미지 스타일 설정 */
        .landscape-img {
            width: 100%; /* 부모 영역에 맞게 꽉 채움 */
            max-width: 650px; /* 최대 가로 크기 제한 (너무 커지는 것 방지) */
            height: auto; /* 세로 비율 자동 맞춤 */
            border-radius: 4px;
            box-shadow: 3px 3px 15px rgba(0,0,0,0.08); /* 부드러운 그림자 */
        }

        /* 오른쪽 영역: 텍스트 중앙/약간 상단 배치로 균형 맞춤 */
        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 8vw 50px 40px;
        }

        .intro-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #555;
            font-weight: 400;
        }

        /* 밑줄 쳐진 링크 키워드 스타일 */
        .keyword-link {
            color: #111;
            text-decoration: none;
            font-weight: 700;
            border-bottom: 2px solid #333; 
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .keyword-link:hover {
            color: #E1AD01; 
            border-bottom-color: #E1AD01;
            background-color: rgba(225, 173, 1, 0.1); 
        }
    </style>
</head>
<body>

    <div class="left-section">
        <img src="IMG_4711.jpg" alt="메인 전시 이미지" class="landscape-img">
    </div>

    <div class="right-section">
        <h1 class="intro-title">권준의 세계에<br>오신 것을 환영합니다.</h1>
        <p class="intro-text">
            이곳은 단어와 이미지 사이의 경계를 탐구하는 공간입니다.<br><br>
            우리가 무심코 지나친 <a href="theme1.html" class="keyword-link">기억</a>의 조각들, 
            비어있음으로 비로소 완성되는 <a href="theme2.html" class="keyword-link">공간</a>의 질감, 
            그리고 일정한 방향으로 흐르지 않는 <a href="theme3.html" class="keyword-link">시간</a>의 궤적들을 천천히 따라가며 관람해 주시기 바랍니다.
        </p>
    </div>

</body>
</html>
