<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모든 일 - 권준의 세계</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header { width: 100%; padding: 8vh 0 4vh 0; text-align: center; }
        .page-title { font-family: 'Noto Serif KR', serif; font-size: 3rem; color: #2c2c2c; margin: 0 0 10px 0; }
        .page-subtitle { font-size: 1.1rem; color: #777; font-weight: 300; letter-spacing: 1px; }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 80px;
            align-items: flex-start; 
        }

        .portfolio-card {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.4s ease;
        }

        .portfolio-card:hover { transform: translateY(-8px); }

        .img-box {
            width: 100%;
            border-radius: 0; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.06); 
            overflow: hidden;
            background-color: #eaeaea; 
        }

        .img-box img {
            width: 100%;
            height: auto; 
            display: block; 
            transition: transform 0.6s ease;
        }

        .portfolio-card:hover .img-box img {
            transform: scale(1.03); 
        }

        .text-box { padding: 15px 5px 0 5px; }
        .work-title { font-family: 'Noto Serif KR', serif; font-size: 1.25rem; font-weight: 700; margin: 0 0 5px 0; color: #111; }
        .work-category { font-size: 0.85rem; color: #888; letter-spacing: 1px; text-transform: uppercase; }

        .back-btn { margin: 0 0 60px 0; padding: 12px 30px; font-size: 1rem; color: #333; text-decoration: none; border: 1px solid #ccc; border-radius: 50px; transition: all 0.3s ease; }
        .back-btn:hover { background-color: #333; color: #fff; border-color: #333; }

        /* -----------------------------------
           [팝업 확대(모달) 창 스타일]
        ----------------------------------- */
        .modal {
            display: none; /* 평소에는 숨겨둠 */
            position: fixed; 
            z-index: 9999; /* 화면 맨 위로 올리기 */
            padding-top: 50px; 
            padding-bottom: 50px;
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; /* 사진이 길면 스크롤 가능하게 설정 */
            background-color: rgba(0,0,0,0.85); /* 약간 투명한 검은색 배경 */
            backdrop-filter: blur(5px); /* 배경을 살짝 흐리게 (고급스러운 느낌) */
        }

        /* 팝업된 이미지 */
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%; /* 너무 꽉 차지 않게 여백 주기 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease; /* 부드럽게 커지는 애니메이션 */
        }

        @keyframes zoomIn {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }

        /* 닫기(X) 버튼 */
        .close-btn {
            position: fixed;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #E1AD01; /* 마우스 올리면 머스타드 색으로 변경 */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="page-title">모든 일</h1>
        <div class="page-subtitle">나를 제대로 아는 것에서 시작된 기록들</div>
    </div>

    <div class="portfolio-grid" id="portfolioBox"></div>

    <a href="next_page.html" class="back-btn">돌아가기</a>

    <div id="imageModal" class="modal" onclick="closeModal(event)">
        <span class="close-btn" onclick="closeModal(event)">&times;</span>
        <img class="modal-content" id="expandedImg">
    </div>

    <script>
        // 👇 여기에 이미지(JPG, PNG) 작업물 리스트를 적어주세요!
        const myWorks = [
            {
                title: "세계로 다가갈 수 없다면",
                category: "Web Zine / [방황,EXP 2025]",
                image: "IMG_0091.jpeg" 
            },
            {
                title: "탈피 (Epilogue)",
                category: "Feature PJ / [방황,EXP 2025]",
                image: "IMG_0090.jpeg"
            }
        ];

        const portfolioBox = document.getElementById('portfolioBox');

        // 카드 생성하기
        myWorks.forEach((work) => {
            // 링크(<a>) 대신 클릭하면 openModal 함수를 실행하는 <div>로 변경했습니다.
            const cardHTML = `
                <div class="portfolio-card" onclick="openModal('${work.image}')">
                    <div class="img-box">
                        <img src="${work.image}" alt="${work.title}">
                    </div>
                    <div class="text-box">
                        <h2 class="work-title">${work.title}</h2>
                        <div class="work-category">${work.category}</div>
                    </div>
                </div>
            `;
            portfolioBox.innerHTML += cardHTML;
        });

        // -----------------------------------
        // [사진 확대 기능 (자바스크립트)]
        // -----------------------------------
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("expandedImg");

        // 사진 클릭 시 팝업 열기
        function openModal(imageSrc) {
            modal.style.display = "block"; // 숨겨둔 창을 보이게 함
            modalImg.src = imageSrc; // 클릭한 사진의 경로를 팝업 창에 전달
            document.body.style.overflow = "hidden"; // 배경 페이지 스크롤 방지
        }

        // 팝업 닫기 (X버튼이나 검은 배경 클릭 시)
        function closeModal(event) {
            // 클릭한 곳이 사진 자체(modalImg)가 아닐 때만 창을 닫음
            if (event.target !== modalImg) {
                modal.style.display = "none";
                document.body.style.overflow = "auto"; // 스크롤 다시 허용
            }
        }
    </script>
</body>
</html>
