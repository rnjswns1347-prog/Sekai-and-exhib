<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 검색 - 전시</title>
    <style>
        /* 웹 폰트 불러오기 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            overflow: hidden; /* 화면 스크롤 방지 */
        }

        /* 전체 레이아웃 */
        .wrapper {
            display: flex;
            justify-content: space-between; /* 양 끝으로 배치 */
            align-items: stretch; 
            height: 100vh;
            width: 100vw;
            padding: 2vh 4vw; /* 위아래, 양옆 여백을 약간만 주어 꽉 찬 느낌 강조 */
            box-sizing: border-box;
            position: relative; /* 중앙 검색창의 절대 위치 기준 */
        }

        /* 양쪽 텍스트 영역 공통 */
        .text-section {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 위에서 아래까지 동일한 간격으로 분배 */
            height: 100%;
            z-index: 1; /* 배경처럼 깔리도록 z-index 낮춤 */
        }

        /* 왼쪽 '세계' 영역 (세리프체) */
        .world-section {
            font-family: 'Noto Serif KR', 'Nanum Myeongjo', 'Batang', serif;
            align-items: flex-start; /* 왼쪽 정렬 */
            text-align: left;
        }

        /* 오른쪽 '전시' 영역 (고딕체) */
        .exhibition-section {
            font-family: 'Noto Sans KR', 'Pretendard', 'Malgun Gothic', sans-serif;
            align-items: flex-end; /* 오른쪽 정렬 */
            text-align: right;
        }

        /* 개별 단어 스타일 (굵고 큼직하게 동일한 크기 적용) */
        .word-item {
            font-size: clamp(2rem, 4.5vh, 4rem); /* 화면 높이에 맞춰 글자 크기 자동 조절 */
            font-weight: 900; /* 가장 굵은 두께 */
            text-transform: uppercase; /* 영문 대문자 통일 */
            margin: 0;
            line-height: 1; /* 위아래 여백 최소화 */
            letter-spacing: -1px;
        }

        /* 컬러 설정 */
        .color-green { color: #2E8B57; }
        .color-mustard { color: #E1AD01; }

        /* 중앙 검색 영역 */
        .center-section {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -65%); /* 중앙에서 살짝 위로 */
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10; /* 양옆 글씨보다 앞으로 오도록 z-index 높임 */
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* 테두리 없는 세련된 검색창 */
        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            background-color: rgba(245, 245, 245, 0.95); /* 뒷배경 글씨가 살짝 비치지 않게 불투명도 조절 */
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* 배경 글씨와 분리감을 위해 미세한 그림자 추가 */
            transition: background-color 0.3s ease;
            box-sizing: border-box;
        }
        .search-box:focus-within {
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* 세련된 SVG 돋보기 아이콘 */
        .search-icon {
            width: 22px;
            height: 22px;
            color: #888;
            margin-right: 15px;
        }

        .search-box input {
            border: none;
            background: transparent;
            font-size: 1.1rem;
            outline: none;
            width: 100%;
            letter-spacing: 1px;
            color: #333;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
        }
        .search-box input::placeholder {
            color: #bbb;
            font-weight: 500;
        }

        /* 오류 메시지 */
        .error-message {
            margin-top: 20px;
            color: #d93025;
            font-size: 0.95rem;
            font-weight: 700;
            height: 20px; 
            letter-spacing: 0.5px;
            font-family: 'Noto Sans KR', sans-serif;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8); /* 뒷 배경 글씨와 겹칠 때를 대비한 가독성 확보 */
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="text-section world-section">
            <div class="word-item color-green">세계</div>
            <div class="word-item color-green">World</div>
            <div class="word-item color-green">世界</div>
            <div class="word-item color-green">Monde</div>
            <div class="word-item color-green">Mundo</div>
            <div class="word-item color-green">Welt</div>
            <div class="word-item color-green">Mondo</div>
            <div class="word-item color-green">Мир</div>
            <div class="word-item color-green">عالم</div>
            <div class="word-item color-green">Dunia</div>
        </div>

        <div class="center-section">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="SEARCH" onkeypress="handleKeyPress(event)">
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="text-section exhibition-section">
            <div class="word-item color-mustard">전시</div>
            <div class="word-item color-mustard">Exhibition</div>
            <div class="word-item color-mustard">展示</div>
            <div class="word-item color-mustard">Exposition</div>
            <div class="word-item color-mustard">Exposición</div>
            <div class="word-item color-mustard">Ausstellung</div>
            <div class="word-item color-mustard">Mostra</div>
            <div class="word-item color-mustard">Выставка</div>
            <div class="word-item color-mustard">معرض</div>
            <div class="word-item color-mustard">Pameran</div>
        </div>
    </div>

    <script>
        // 검색 실패 횟수 카운터
        let failCount = 0;

        // 엔터키 입력 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkSearch();
            }
        }

        // 검색어 검증 로직
        function checkSearch() {
            const inputValue = document.getElementById('searchInput').value.trim();
            const errorMsgElement = document.getElementById('errorMessage');

            if (inputValue === '권준') {
                // 정답 시 다음 페이지로 즉시 이동
                window.location.href = "next_page.html"; 
            } else {
                failCount++;
                
                // 오답 메시지 힌트 노출
                if (failCount === 1) {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 ■■뿐입니다.";
                } else if (failCount === 2) {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 ■준뿐입니다.";
                } else {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 권준뿐입니다.";
                }
            }
        }
    </script>
</body>
</html>
