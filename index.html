<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 검색 - 전시</title>
    <style>
        /* 웹 폰트 불러오기 및 시스템 폰트 설정 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@700;900&display=swap');

        /* 레트로 폰트 설정 */
        @font-face {
            font-family: 'WindowsSystem';
            src: url('https://db.onlinewebfonts.com/t/2c2069b7f583f7a4dfd60e6e765a04a6.woff2') format('woff2'); /* Windows System Font */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            overflow: hidden; /* 화면 스크롤 방지 */
        }

        /* 전체 레이아웃 */
        .wrapper {
            display: flex;
            justify-content: space-between; /* 양 끝으로 배치 */
            align-items: stretch; 
            height: 100vh;
            width: 100vw;
            padding: 2vh 4vw; /* 위아래, 양옆 여백을 약간만 주어 꽉 찬 느낌 강조 */
            box-sizing: border-box;
            position: relative; /* 중앙 검색창의 절대 위치 기준 */
        }

        /* 양쪽 텍스트 영역 공통 */
        .text-section {
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 위에서 아래까지 동일한 간격으로 분배 */
            height: 100%;
            z-index: 1; /* 배경처럼 깔리도록 z-index 낮춤 */
        }

        /* 왼쪽 '세계' 영역 (세리프체) */
        .world-section {
            font-family: 'Noto Serif KR', 'Nanum Myeongjo', 'Batang', serif;
            align-items: flex-start; /* 왼쪽 정렬 */
            text-align: left;
        }

        /* 오른쪽 '전시' 영역 (고딕체) */
        .exhibition-section {
            font-family: 'Noto Sans KR', 'Pretendard', 'Malgun Gothic', sans-serif;
            align-items: flex-end; /* 오른쪽 정렬 */
            text-align: right;
        }

        /* 개별 단어 스타일 */
        .word-item {
            font-size: clamp(2rem, 4.5vh, 4rem); /* 화면 높이에 맞춰 글자 크기 자동 조절 */
            font-weight: 900; /* 가장 굵은 두께 */
            text-transform: uppercase; /* 영문 대문자 통일 */
            margin: 0;
            line-height: 1; /* 위아래 여백 최소화 */
            letter-spacing: -1px;
        }

        /* 컬러 설정 */
        .color-green { color: #2E8B57; }
        .color-mustard { color: #E1AD01; }

        /* 중앙 검색 영역 (레트로 윈도우 스타일) */
        .center-section {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -65%); /* 중앙에서 살짝 위로 */
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10; /* 양옆 글씨보다 앞으로 오도록 z-index 높임 */
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* 레트로 검색창 컨테이너 */
        .retro-window.search-area {
            background-color: #c0c0c0; /* 레트로 회색 */
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; /* 3D 입체 효과 */
            padding: 5px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* 레트로 입력창 스타일 */
        .retro-window input {
            flex-grow: 1;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080; /* 레트로 오목 효과 */
            background-color: #ffffff;
            padding: 5px;
            font-size: 1.1rem;
            outline: none;
            color: #333;
            font-family: 'Courier New', Courier, monospace; /* 레트로 텍스트 폰트 */
            box-sizing: border-box;
        }
        .retro-window input::placeholder {
            color: #bbb;
        }

        /* 레트로 검색 버튼 스타일 */
        .retro-window button {
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; /* 3D 입체 효과 */
            background-color: #c0c0c0;
            color: #333;
            font-family: 'WindowsSystem', sans-serif; /* 레트로 시스템 폰트 */
            font-size: 1rem;
            padding: 5px 10px;
            margin-left: 5px;
            cursor: pointer;
            box-sizing: border-box;
        }
        .retro-window button:active {
            border-color: #808080 #ffffff #ffffff #808080; /* 눌렸을 때 효과 */
        }

        /* 레트로 오류 대화 상자 스타일 */
        .error-message.MessageBox {
            background-color: #c0c0c0; /* 레트로 회색 */
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff; /* 3D 입체 효과 */
            padding: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            position: relative;
        }

        /* 레트로 오류 메시지 텍스트 */
        .MessageBox .text {
            color: #d93025; /* 오류 빨간색 */
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-family: 'WindowsSystem', sans-serif; /* 레트로 시스템 폰트 */
            margin: 0;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="text-section world-section">
            <div class="word-item color-green">세계</div>
            <div class="word-item color-green">World</div>
            <div class="word-item color-green">世界</div>
            <div class="word-item color-green">Monde</div>
            <div class="word-item color-green">Mundo</div>
            <div class="word-item color-green">Welt</div>
            <div class="word-item color-green">Mondo</div>
            <div class="word-item color-green">Мир</div>
            <div class="word-item color-green">عالم</div>
            <div class="word-item color-green">Dunia</div>
        </div>

        <div class="center-section">
            <div class="retro-window search-area">
                <input type="text" id="searchInput" placeholder="SEARCH" onkeypress="handleKeyPress(event)">
                <button onclick="checkSearch()">검색</button>
            </div>
            <div class="error-message MessageBox" id="errorMessage" style="display: none;">
                <p class="text"></p>
            </div>
        </div>

        <div class="text-section exhibition-section">
            <div class="word-item color-mustard">전시</div>
            <div class="word-item color-mustard">Exhibition</div>
            <div class="word-item color-mustard">展示</div>
            <div class="word-item color-mustard">Exposition</div>
            <div class="word-item color-mustard">Exposición</div>
            <div class="word-item color-mustard">Ausstellung</div>
            <div class="word-item color-mustard">Mostra</div>
            <div class="word-item color-mustard">Выставка</div>
            <div class="word-item color-mustard">معرض</div>
            <div class="word-item color-mustard">Pameran</div>
        </div>
    </div>

    <script>
        // 검색 실패 횟수 카운터
        let failCount = 0;

        // 엔터키 입력 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkSearch();
            }
        }

        // 검색어 검증 로직
        function checkSearch() {
            const inputValue = document.getElementById('searchInput').value.trim();
            const errorMessageBox = document.getElementById('errorMessage');
            const errorTextElement = errorMessageBox.querySelector('.text');

            if (inputValue === '권준') {
                // 정답 시 다음 페이지로 즉시 이동
                window.location.href = "next_page.html"; 
            } else {
                failCount++;
                
                // 오답 메시지 힌트 노출 및 레트로 대화 상자 표시
                errorMessageBox.style.display = 'block';

                if (failCount === 1) {
                    errorTextElement.innerText = "이 세계에서 검색할 수 있는것은 ■■뿐입니다.";
                } else if (failCount === 2) {
                    errorTextElement.innerText = "이 세계에서 검색할 수 있는것은 ■준뿐입니다.";
                } else {
                    errorTextElement.innerText = "이 세계에서 검색할 수 있는것은 권준뿐입니다.";
                }
            }
        }
    </script>
</body>
</html>
