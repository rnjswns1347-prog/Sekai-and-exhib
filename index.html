<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 검색 - 전시</title>
    <style>
        /* 웹 폰트 불러오기 (세리프: 바탕/명조계열, 고딕: 본고딕/산세리프계열) */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        /* 전체 레이아웃 */
        .wrapper {
            display: flex;
            justify-content: space-between; /* 양 끝으로 배치 */
            align-items: flex-start; /* 모든 요소를 상단(위쪽)에 맞춤 */
            height: 100vh;
            width: 100vw;
            padding: 60px 8% 0 8%; /* 상단에 60px 여백을 주어 글자를 위에 배치 */
            box-sizing: border-box;
        }

        /* 양쪽 텍스트 영역 공통 */
        .text-section {
            flex: 1;
            max-width: 300px;
            display: flex;
            flex-direction: column;
        }

        /* 왼쪽 '세계' 영역 (세리프체/녹색) */
        .world-section {
            font-family: 'Noto Serif KR', 'Nanum Myeongjo', 'Batang', serif;
            align-items: flex-start; /* 왼쪽 정렬 */
        }

        /* 오른쪽 '전시' 영역 (고딕체/머스타드) */
        .exhibition-section {
            font-family: 'Noto Sans KR', 'Pretendard', 'Malgun Gothic', sans-serif;
            align-items: flex-end; /* 오른쪽 정렬로 대칭감 부여 */
            text-align: right;
        }

        /* 메인 키워드 */
        .keyword {
            font-size: 4rem;
            font-weight: 700;
            margin: 0 0 30px 0;
            letter-spacing: -2px;
        }

        /* 컬러 설정 */
        .color-green { color: #2E8B57; }
        .color-mustard { color: #E1AD01; }

        /* 다국어 리스트 나열 */
        .word-list {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 글자 사이 간격 */
            font-size: 1.1rem;
            opacity: 0.6; /* 약간 투명하게 처리하여 배경처럼 느껴지게 */
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* 중앙 검색 영역 */
        .center-section {
            flex: 1.5;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; 
            /* 화면 전체 높이를 기준으로 중앙을 잡은 뒤, 위로 끌어올림 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -65%); /* Y축을 -65%로 주어 중앙보다 약간 위로 배치 */
            padding: 0 40px;
            box-sizing: border-box;
        }

        /* 테두리 없는 세련된 검색창 */
        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            background-color: #f5f5f5;
            padding: 15px 25px;
            border-radius: 50px;
            transition: background-color 0.3s ease;
            box-sizing: border-box;
        }
        .search-box:focus-within {
            background-color: #eeeeee;
        }

        /* 세련된 SVG 돋보기 아이콘 */
        .search-icon {
            width: 22px;
            height: 22px;
            color: #888;
            margin-right: 15px;
        }

        .search-box input {
            border: none;
            background: transparent;
            font-size: 1.1rem;
            outline: none;
            width: 100%;
            letter-spacing: 1px;
            color: #333;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .search-box input::placeholder {
            color: #bbb;
            font-weight: 300;
        }

        /* 오류 메시지 */
        .error-message {
            margin-top: 20px;
            color: #d93025;
            font-size: 0.95rem;
            font-weight: 500;
            height: 20px; 
            letter-spacing: 0.5px;
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="text-section world-section">
            <h1 class="keyword color-green">세계</h1>
            <ul class="word-list color-green">
                <li>World</li>
                <li>世界</li>
                <li>Monde</li>
                <li>Mundo</li>
                <li>Welt</li>
                <li>Mondo</li>
                <li>Мир</li>
                <li>عالم</li>
                <li>Dunia</li>
                <li>Kósmos</li>
            </ul>
        </div>

        <div class="center-section">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="SEARCH" onkeypress="handleKeyPress(event)">
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="text-section exhibition-section">
            <h1 class="keyword color-mustard">전시</h1>
            <ul class="word-list color-mustard">
                <li>Exhibition</li>
                <li>展示</li>
                <li>Exposition</li>
                <li>Exposición</li>
                <li>Ausstellung</li>
                <li>Mostra</li>
                <li>Выставка</li>
                <li>معرض</li>
                <li>Pameran</li>
                <li>Sergi</li>
            </ul>
        </div>
    </div>

    <script>
        // 검색 실패 횟수 카운터
        let failCount = 0;

        // 엔터키 입력 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkSearch();
            }
        }

        // 검색어 검증 로직
        function checkSearch() {
            const inputValue = document.getElementById('searchInput').value.trim();
            const errorMsgElement = document.getElementById('errorMessage');

            if (inputValue === '권준') {
                // 정답 시 다음 페이지로 즉시 이동
                window.location.href = "next_page.html"; 
            } else {
                failCount++;
                
                // 오답 메시지 힌트 노출
                if (failCount === 1) {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 ■■뿐입니다.";
                } else if (failCount === 2) {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 ■준뿐입니다.";
                } else {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 권준뿐입니다.";
                }
            }
        }
    </script>
</body>
</html>
