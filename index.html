<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 검색 - 전시</title>
    <style>
        /* 기본 여백 제거 및 폰트 설정 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        /* 넓고 시원한 전체 레이아웃 */
        .wrapper {
            display: flex;
            justify-content: space-evenly; /* 양옆으로 넓게 배치 */
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 0 5%;
            box-sizing: border-box;
        }

        /* 왼쪽/오른쪽 텍스트 영역 (테두리 없음) */
        .text-section {
            flex: 1;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* 메인 키워드 */
        .keyword {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }

        /* 컬러 설정 */
        .color-green { color: #2E8B57; }
        .color-mustard { color: #E1AD01; }

        /* 연한 버전의 사전적 의미 (클릭 버튼 역할) */
        .definition-trigger {
            font-size: 1rem;
            line-height: 1.6;
            cursor: pointer;
            transition: opacity 0.3s ease;
            margin: 0;
            font-weight: 500;
        }
        /* 마우스 올렸을 때 상호작용 피드백 */
        .definition-trigger:hover {
            opacity: 0.7;
        }
        .light-green { color: rgba(46, 139, 87, 0.65); }
        .light-mustard { color: rgba(225, 173, 1, 0.65); }

        /* 토글되어 나타날 숨겨진 텍스트 */
        .toggle-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            margin-top: 0;
            transition: all 0.4s ease-in-out;
        }
        /* 텍스트가 열렸을 때의 상태 */
        .toggle-content.show {
            max-height: 200px;
            opacity: 1;
            margin-top: 20px;
        }

        /* 중앙 검색 영역 */
        .center-section {
            flex: 1;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 40px;
        }

        /* 테두리 없는 세련된 검색창 */
        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            background-color: #f5f5f5; /* 아주 연한 회색 배경 */
            padding: 15px 25px;
            border-radius: 50px;
            transition: background-color 0.3s ease;
        }
        .search-box:focus-within {
            background-color: #eeeeee; /* 클릭 시 살짝 진해짐 */
        }

        /* 세련된 SVG 돋보기 아이콘 */
        .search-icon {
            width: 22px;
            height: 22px;
            color: #888;
            margin-right: 15px;
        }

        .search-box input {
            border: none;
            background: transparent;
            font-size: 1.1rem;
            outline: none;
            width: 100%;
            letter-spacing: 1px;
            color: #333;
        }
        .search-box input::placeholder {
            color: #bbb;
            font-weight: 300;
        }

        /* 오류 메시지 */
        .error-message {
            margin-top: 20px;
            color: #d93025;
            font-size: 0.95rem;
            font-weight: 500;
            height: 20px; /* 공간 고정 */
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="text-section">
            <h1 class="keyword color-green">세계</h1>
            <p class="definition-trigger light-green" onclick="toggleText('content-world')">
                [사전적 의미] 지구상의 모든 나라. 또는 인류 사회 전체.
            </p>
            <div class="toggle-content" id="content-world">
                이곳은 '세계'와 관련된 작가님의 구체적인 기획 의도나 전시 서문, 혹은 추가적인 설명이 들어갈 임시 텍스트 영역입니다. 나중에 원하시는 글로 수정해 주시면 됩니다.
            </div>
        </div>

        <div class="center-section">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="SEARCH" onkeypress="handleKeyPress(event)">
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="text-section">
            <h1 class="keyword color-mustard">전시</h1>
            <p class="definition-trigger light-mustard" onclick="toggleText('content-exhibition')">
                [사전적 의미] 여러 가지 물품을 한곳에 벌여 놓고 일반에게 보임.
            </p>
            <div class="toggle-content" id="content-exhibition">
                이곳은 '전시'와 관련된 관람 안내, 작품 소개, 혹은 숨겨진 메시지가 들어갈 수 있는 임시 텍스트 영역입니다. 텍스트 분량에 맞게 자연스럽게 펼쳐집니다.
            </div>
        </div>
    </div>

    <script>
        // 텍스트 토글 기능
        function toggleText(elementId) {
            const content = document.getElementById(elementId);
            content.classList.toggle('show');
        }

        // 검색 실패 횟수 카운터
        let failCount = 0;

        // 엔터키 입력 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                checkSearch();
            }
        }

        // 검색어 검증 및 페이지 이동 로직
        function checkSearch() {
            const inputValue = document.getElementById('searchInput').value.trim();
            const errorMsgElement = document.getElementById('errorMessage');

            if (inputValue === '권준') {
                // 정답 입력 시 팝업 없이 다음 페이지로 즉시 이동
                window.location.href = "next_page.html"; 
            } else {
                failCount++;
                
                // 오답 횟수에 따른 힌트 제공
                if (failCount === 1) {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 ■■뿐입니다.";
                } else if (failCount === 2) {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 ■준뿐입니다.";
                } else {
                    errorMsgElement.innerText = "이 세계에서 검색할 수 있는것은 권준뿐입니다.";
                }
            }
        }
    </script>
</body>
</html>
