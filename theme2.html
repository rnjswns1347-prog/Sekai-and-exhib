<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전시 - 권준의 세계</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 상단 타이틀 영역 */
        .header {
            width: 100%;
            padding: 8vh 0 4vh 0;
            text-align: center;
        }

        .page-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 3rem;
            color: #E1AD01;
            margin: 0 0 10px 0;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: #777;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* 갤러리 레이아웃 (사진 비율이 달라도 균형을 잡도록 수정) */
        .gallery-container {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 여전히 위쪽 정렬을 기본으로 하되 간격 조정 */
            gap: 5vw;
            max-width: 1100px; /* 가로형 사진을 고려해 조금 더 넓게 배치 */
            width: 90%;
            margin-bottom: 80px;
        }

        /* 개별 SNS 카드 스타일 */
        .sns-card {
            width: 100%;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            transition: transform 0.4s ease;
        }

        /* 인스타그램 카드 (세로형 가로폭 제한) */
        .card-insta {
            flex: 1; /* 공간을 균등하게 나누되 최대폭 제한 */
            max-width: 350px; 
            margin-top: 0;
        }

        /* 블로그 카드 (가로형 가로폭을 조금 더 넓게) */
        .card-blog {
            flex: 1.3; /* 가로형 이미지를 위해 공간을 조금 더 부여 */
            max-width: 500px;
            margin-top: 80px; /* 비대칭 효과를 주되 간격을 살짝 줄임 */
        }

        /* 마우스 오버 시 떠오르는 효과 */
        .sns-card:hover {
            transform: translateY(-10px);
        }

        /* 이미지 컨테이너 (고정된 aspect-ratio 삭제) */
        .img-box {
            width: 100%;
            /* aspect-ratio: 3 / 4; <--- 이 부분을 삭제하여 사진 비율을 따르게 함 */
            overflow: hidden;
            border-radius: 4px;
            box-shadow: 4px 10px 25px rgba(0,0,0,0.06);
            background-color: #fff;
            position: relative;
        }

        /* 실제 이미지 (object-fit: cover 삭제) */
        .img-box img {
            width: 100%;
            height: auto; /* 세로 높이가 사진 비율에 맞춰 자동 조절됨 */
            display: block; /* 이미지 아래 미세한 공백 제거 */
            /* object-fit: cover; <--- 이 부분을 삭제하여 원본 비율 유지 */
            transition: transform 0.5s ease;
        }

        .sns-card:hover .img-box img {
            transform: scale(1.03); /* 확대 비율을 살짝 줄여 부드럽게 */
        }

        /* 사진 아래 텍스트 영역 */
        .text-box {
            padding: 20px 10px;
        }

        .sns-type {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sns-type::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #E1AD01;
            border-radius: 50%;
        }

        .sns-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
            margin: 0;
            word-break: keep-all;
        }

        /* 메인으로 돌아가기 버튼 */
        .back-btn {
            margin: 0 0 60px 0;
            padding: 12px 30px;
            font-size: 1rem;
            color: #333;
            text-decoration: none;
            border: 1px solid #ccc;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #333;
            color: #fff;
            border-color: #333;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="page-title">전시</h1>
        <div class="page-subtitle">나를 세상에 내어보이는 두 개의 창구</div>
    </div>

    <div class="gallery-container">
        
        <a href="https://instagram.com/me1ancholiee" target="_blank" class="sns-card card-insta">
            <div class="img-box">
                <img src="IG.jpeg" alt="인스타그램 캡처">
            </div>
            <div class="text-box">
                <h2 class="sns-type">Instagram</h2>
                <p class="sns-desc">해보고싶은걸 다 해보는 계정</p>
            </div>
        </a>

        <a href="https://blog.naver.com/rnjswns1347" target="_blank" class="sns-card card-blog">
            <div class="img-box">
                <img src="BLOG.jpeg" alt="블로그 캡처">
            </div>
            <div class="text-box">
                <h2 class="sns-type">Blog</h2>
                <p class="sns-desc">정원을 가꾸듯 사람들을 길러 심는 곳입니다.</p>
            </div>
        </a>

    </div>

    <a href="next_page.html" class="back-btn">돌아가기</a>

</body>
</html>
